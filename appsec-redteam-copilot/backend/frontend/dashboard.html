<!doctype html>
<html><head><meta charset="utf-8"/><title>AppSec Copilot Dashboard</title>
<style>body{font-family:Arial;margin:24px;background:#0b1220;color:#e5e7eb} .card{background:#111827;border:1px solid #334155;border-radius:10px;padding:14px;margin-bottom:12px} .badge{padding:2px 8px;border-radius:999px} .low{background:#14532d}.medium{background:#92400e}.high{background:#991b1b} button{padding:8px 10px}</style></head>
<body>
<h1>AppSec Red Team Copilot — Dashboard</h1>
<div class="card" id="setupCard" style="display:none"><h3>First-Run Setup</h3><p>Set your project/workspace path to monitor.</p><input id="setupPath" style="width:70%" placeholder="/absolute/path"/> <button onclick="runFirstSetup()">Initialize</button><div id="setupMsg"></div></div>
<div class="card"><button onclick="refreshAll()">Refresh</button> <button onclick="runEval()">Run Eval</button> <button onclick="refreshAdv()">Refresh Advisories</button><br><br>
<input id="repoPath" style="width:70%" value="/workspace/backend/api/main.py"/> <button onclick="analyzeRepo()">Analyze Repo Diff</button> <button onclick="analyzeHunks()">Analyze Pre-Change Hunks</button>
<div id="status"></div></div>
<div class="card"><h3>Latest Eval</h3><pre id="eval">(none)</pre></div>
<div class="card"><h3>Watch Config</h3><div id="watchInfo"></div><input id="newPath" style="width:70%" placeholder="/path/to/project"/> <button onclick="addProjectPath()">Add Project Path</button> <button onclick="setWorkspaceRoot()">Set Workspace Root</button></div>
<div class="card"><h3>Directory Picker</h3><div>Current: <code id="pickerPath">/workspace</code></div><button onclick="pickerUp()">Up</button> <button onclick="pickerUseCurrent()">Use Current Path</button><div id="pickerDirs" style="max-height:220px;overflow:auto;margin-top:8px"></div></div>
<div class="card"><h3>Recent Reports</h3><div id="reports"></div></div>
<div class="card"><h3>Selected Report Detail</h3><div id="detailSummary"></div><div id="detailTable"></div><pre id="detail" style="display:none"></pre></div>
<script>
async function j(url, opts){const r=await fetch(url,opts); return r.json();}
function riskBadge(r){const c=(r||'low').toLowerCase(); return `<span class="badge ${c}">${(r||'unknown').toUpperCase()}</span>`;}
async function loadReports(){const d=await j('/reports?limit=10'); const el=document.getElementById('reports'); el.innerHTML=''; const arr=(d.items||[]).slice().reverse(); arr.forEach((x,i)=>{const div=document.createElement('div'); div.className='card'; div.style.cursor='pointer'; const newest=i===0?'<span class="badge low">NEWEST</span> ':''; div.innerHTML=`${newest}<b>${x.summary||''}</b><br>Risk: ${riskBadge(x.risk)}<br><small>${x.savedAt||''}</small>`; div.onclick=()=>showDetail(x); el.appendChild(div);});}
async function runEval(){const d=await j('/eval/run',{method:'POST'}); document.getElementById('eval').textContent=JSON.stringify(d,null,2); document.getElementById('status').textContent='Eval complete';}
async function refreshAdv(){const d=await j('/advisories/refresh?limit=30',{method:'POST'}); document.getElementById('status').textContent=`Advisories refreshed: ${d.count}`;}

function showDetail(x){
  const sum=document.getElementById('detailSummary');
  const tbl=document.getElementById('detailTable');
  sum.innerHTML = `<b>Project:</b> ${x.project||''} &nbsp; | &nbsp; <b>Overall:</b> ${riskBadge(x.risk)} &nbsp; | &nbsp; <b>Verdict:</b> <b>${(x.verdict||'n/a').toUpperCase()}</b> &nbsp; | &nbsp; <b>Summary:</b> ${x.summary||''}`;
  const rows=(x.findings||[]).map(f=>{
    const sig=(f.findings||[]).map(z=>`${z.type}:${z.severity}`).join(', ') || '-';
    const ev=(f.evidence||[]).map(e=>e.id).join(', ') || '-';
    return `<tr><td style="padding:6px;border-bottom:1px solid #334155">${f.path||''}</td><td style="padding:6px;border-bottom:1px solid #334155">${riskBadge(f.risk)}</td><td style="padding:6px;border-bottom:1px solid #334155">${f.score||0}</td><td style="padding:6px;border-bottom:1px solid #334155">${f.confidence||0}</td><td style="padding:6px;border-bottom:1px solid #334155">${sig}</td><td style="padding:6px;border-bottom:1px solid #334155">${ev}</td></tr>`;
  }).join('');
  tbl.innerHTML = `<table style="width:100%;border-collapse:collapse;margin-top:10px"><thead><tr><th align=left>File</th><th align=left>Risk</th><th align=left>Score</th><th align=left>Conf</th><th align=left>Signals</th><th align=left>Evidence IDs</th></tr></thead><tbody>${rows || '<tr><td colspan="6">No findings</td></tr>'}</tbody></table>`;
}
async function analyzeHunks(){
  const p=document.getElementById('repoPath').value.trim();
  const d=await j('/analyze-diff-hunks?path='+encodeURIComponent(p),{method:'POST'});
  document.getElementById('status').textContent = d.error ? ('Error: '+d.error) : ('Pre-change analyzed. Risk='+d.risk+' Verdict='+(d.verdict||'n/a'));
  if(!d.error) showDetail(d);
  await loadReports();
}

async function analyzeRepo(){
  const p=document.getElementById('repoPath').value.trim();
  if(!p){document.getElementById('status').textContent='Enter repo path'; return;}
  const d=await j('/analyze-repo-diff?path='+encodeURIComponent(p),{method:'POST'});
  document.getElementById('status').textContent = d.error ? ('Error: '+d.error) : ('Analyzed. Risk='+d.risk);
  if(!d.error) showDetail(d);
  await loadReports();
}

async function refreshAll(){await loadReports(); document.getElementById('status').textContent='Refreshed';}

async function loadWatchConfig(){
  const d=await j('/config/watch');
  const r=d.registry||{};
  const w=d.watch||{};
  const ap=(r.approvedProjects||[]).map(x=>`<li>${x} <button onclick="removeProjectPath('`+x+`')">remove</button></li>`).join('');
  document.getElementById('watchInfo').innerHTML = `<b>workspaceRoot:</b> ${w.workspaceRoot||''}<br><b>approvedProjects:</b><ul>${ap}</ul>`;
}
async function addProjectPath(){
  const p=document.getElementById('newPath').value.trim(); if(!p) return;
  await j('/config/projects/add?path='+encodeURIComponent(p),{method:'POST'});
  document.getElementById('status').textContent='Project path added';
  await loadWatchConfig();
}
async function removeProjectPath(p){
  await j('/config/projects/remove?path='+encodeURIComponent(p),{method:'POST'});
  document.getElementById('status').textContent='Project path removed';
  await loadWatchConfig();
}
async function setWorkspaceRoot(){
  const p=document.getElementById('newPath').value.trim(); if(!p) return;
  await j('/config/workspace-root?path='+encodeURIComponent(p),{method:'POST'});
  document.getElementById('status').textContent='workspaceRoot updated';
  await loadWatchConfig();
}


let pickerCurrent='/workspace';
async function loadPicker(path){
  const d=await j('/fs/list?path='+encodeURIComponent(path));
  if(d.error){document.getElementById('status').textContent='Picker error: '+d.error; return;}
  pickerCurrent=d.path;
  document.getElementById('pickerPath').textContent=pickerCurrent;
  const el=document.getElementById('pickerDirs');
  el.innerHTML='';
  (d.dirs||[]).forEach(x=>{
    const row=document.createElement('div');
    row.style.padding='4px';
    row.innerHTML=`<button onclick="loadPicker('${x.path.replace(/'/g,"\'")}')">Open</button> <button onclick="selectPicker('${x.path.replace(/'/g,"\'")}')">Select</button> ${x.name}`;
    el.appendChild(row);
  });
  window._pickerParent=d.parent;
}
function pickerUp(){ if(window._pickerParent){ loadPicker(window._pickerParent); } }
function selectPicker(p){ document.getElementById('newPath').value=p; }
function pickerUseCurrent(){ document.getElementById('newPath').value=pickerCurrent; }


async function loadSetupStatus(){
  const d=await j('/setup/status');
  const card=document.getElementById('setupCard');
  if(!d.setupComplete){
    card.style.display='block';
    document.getElementById('setupPath').value=d.workspaceRoot||'/workspace';
  } else {
    card.style.display='none';
  }
}
async function runFirstSetup(){
  const p=document.getElementById('setupPath').value.trim();
  if(!p){document.getElementById('setupMsg').textContent='Enter a path'; return;}
  await j('/setup/init?path='+encodeURIComponent(p),{method:'POST'});
  document.getElementById('setupMsg').textContent='Saved. Refreshing config...';
  await loadWatchConfig();
  await loadSetupStatus();
}

refreshAll();
loadWatchConfig();
loadPicker(pickerCurrent);
loadSetupStatus();
</script>
</body></html>
