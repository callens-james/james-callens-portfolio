<!doctype html><html><head><meta charset='utf-8'><title>Timeline Viewer</title>
<style>
body{font-family:Arial;background:#0b1020;color:#e2e8f0;padding:16px}.card{max-width:1100px;margin:0 auto;background:#111827;border:1px solid #374151;border-radius:12px;padding:12px}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}input,select,button{padding:8px;border-radius:8px;border:1px solid #475569;background:#0f172a;color:#e2e8f0}
.badge{padding:2px 8px;border-radius:999px;font-size:12px}.low{background:#14532d}.medium{background:#78350f}.high{background:#7f1d1d}.small{font-size:12px;color:#94a3b8}
.ev{border:1px solid #334155;border-radius:10px;padding:10px;margin-top:8px;background:#0b1327}
</style></head><body><div class='card'>
<h2>Agent Timeline Viewer</h2>
<div class='row'><label>Risk <select id='risk'><option value=''>all</option><option>low</option><option>medium</option><option>high</option></select></label>
<label>Tool <input id='tool' placeholder='shell/file-edit'></label><label>Limit <input id='limit' value='200' size='6'></label>
<button id='refresh'>Refresh</button></div>
<div id='summary' class='small' style='margin-top:8px'></div>
<div id='events'></div>
</div>
<script>
const $=id=>document.getElementById(id);
function badge(r){return `<span class='badge ${r}'>${r.toUpperCase()}</span>`}
async function loadSummary(){const r=await fetch('/api/summary');const d=await r.json(); const s=d.summary||{}; $('summary').textContent=`Total: ${s.total||0} | Low: ${s.low||0} | Medium: ${s.medium||0} | High: ${s.high||0} | Confirm Required: ${s.confirm||0}`}
async function loadEvents(){const q=new URLSearchParams({risk:$('risk').value,tool:$('tool').value,limit:$('limit').value}); const r=await fetch('/api/events?'+q.toString()); const d=await r.json();
$('events').innerHTML=(d.events||[]).map(e=>`<div class='ev'>${badge(e?.decision?.riskLevel||'low')} <span class='small'>${e.ts||''}</span><div><b>Tool:</b> ${e?.input?.tool||'n/a'} | <b>Action:</b> ${e?.input?.action||'n/a'}</div><div><b>Task:</b> ${e?.input?.task||''}</div><div><b>Score:</b> ${e?.decision?.score} | <b>Confirm:</b> ${e?.decision?.requiresConfirmation}</div><div class='small'>Reasons: ${(e?.decision?.reasons||[]).join(' | ')}</div></div>`).join('') || '<div class="small">No events.</div>';
}
$('refresh').onclick=async()=>{await loadSummary(); await loadEvents();};
window.onload=()=>$('refresh').click();
</script></body></html>
