<!doctype html><html><head><meta charset='utf-8'><title>Eval Harness</title>
<style>body{font-family:Arial;background:#0b1020;color:#e2e8f0;padding:16px}.card{max-width:1100px;margin:0 auto;background:#111827;border:1px solid #374151;border-radius:12px;padding:12px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}button,select{padding:8px;border-radius:8px;border:1px solid #475569;background:#0f172a;color:#e2e8f0}.ok{color:#86efac}.bad{color:#fca5a5}.small{font-size:12px;color:#94a3b8}table{width:100%;border-collapse:collapse;margin-top:10px}td,th{border:1px solid #334155;padding:6px;text-align:left}</style>
</head><body><div class='card'>
<h2>Evaluation Harness</h2>
<div class='row'><button id='run'>Run Batch</button><span id='summary' class='small'>Idle</span></div>
<div class='row' style='margin-top:8px'><label>Report <select id='reports'></select></label><button id='load'>Load</button></div>
<div id='table'></div>
</div>
<script>
const $=id=>document.getElementById(id);
async function refreshReports(){const r=await fetch('/api/reports');const d=await r.json(); $('reports').innerHTML=(d.reports||[]).map(x=>`<option>${x}</option>`).join('');}
function render(rows){const pass=rows.filter(r=>r.pass).length; const p95=[...rows].map(r=>r.latencyMs).sort((a,b)=>a-b)[Math.floor(rows.length*0.95)-1]||0; $('summary').innerHTML=`Total ${rows.length} | Pass ${pass} | PassRate ${(pass/rows.length*100).toFixed(1)}% | p95 ${p95}ms`;
$('table').innerHTML=`<table><tr><th>ID</th><th>Expected</th><th>Got</th><th>Pass</th><th>Latency</th><th>Confirm</th><th>Score</th></tr>${rows.map(r=>`<tr><td>${r.id}</td><td>${r.expectedRisk}</td><td>${r.gotRisk}</td><td class='${r.pass?'ok':'bad'}'>${r.pass}</td><td>${r.latencyMs}</td><td>${r.requiresConfirmation}</td><td>${r.score??''}</td></tr>`).join('')}</table>`;}
$('run').onclick=async()=>{ $('summary').textContent='Running...'; const r=await fetch('/api/run',{method:'POST'}); const d=await r.json(); await refreshReports(); if($('reports').value){ const rr=await fetch('/api/report/'+$('reports').value); render(await rr.json()); }};
$('load').onclick=async()=>{ if(!$('reports').value) return; const r=await fetch('/api/report/'+$('reports').value); render(await r.json()); };
window.onload=async()=>{await refreshReports(); if($('reports').value) $('load').click();};
</script></body></html>
